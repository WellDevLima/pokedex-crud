<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Capturar Pokémon</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            max-width: 500px;
            margin: 0 auto;
        }
        div {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="file"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #999;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        input[type="submit"] {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        input[type="submit"]:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <h1>Capturar Pokémon</h1>
 
    <form action="#" th:action="@{/pokemon}" method="post" th:object="${pokemon}" enctype="multipart/form-data">
        <div>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" th:field="*{nome}" required />
        </div>
 
        <div>
            <label for="tipo1">Tipo 1:</label>
            <select id="tipo1" th:field="*{tipo1}" required>
                <option value="">-- Selecione --</option>
                <option>Fogo</option>
                <option>Água</option>
                <option>Grama</option>
                <option>Elétrico</option>
                <option>Psíquico</option>
                <option>Gelo</option>
                <option>Dragão</option>
                <option>Escuro</option>
                <option>Fada</option>
                <option>Normal</option>
                <option>Lutador</option>
                <option>Voador</option>
                <option>Venenoso</option>
                <option>Terra</option>
                <option>Rocha</option>
                <option>Inseto</option>
                <option>Aço</option>
                <option>Fantasma</option>
            </select>
        </div>
 
        <div>
            <label for="tipo2">Tipo 2 (Opcional):</label>
            <select id="tipo2" th:field="*{tipo2}">
                <option value="">-- Nenhum --</option>
                <option>Fogo</option>
                <option>Água</option>
                <option>Grama</option>
                <option>Elétrico</option>
                <option>Psíquico</option>
                <option>Gelo</option>
                <option>Dragão</option>
                <option>Escuro</option>
                <option>Fada</option>
                <option>Normal</option>
                <option>Lutador</option>
                <option>Voador</option>
                <option>Venenoso</option>
                <option>Terra</option>
                <option>Rocha</option>
                <option>Inseto</option>
                <option>Aço</option>
                <option>Fantasma</option>
            </select>
        </div>
 
        <div>
            <label for="descricao">Descrição:</label>
            <textarea id="descricao" th:field="*{descricao}" required></textarea>
        </div>
 
        <div>
            <label for="arquivo">Foto:</label>
            <input type="file" id="arquivo" name="arquivo" accept="image/*" required />
        </div>
 
        <div>
            <input type="submit" value="Capturar" />
        </div>
    </form>
</body>
</html>
