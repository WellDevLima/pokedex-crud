<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Capturar Pokémon</title>
</head>
<body>
    <h1>Capturar Pokémon</h1>

    <form action="#" th:action="@{/pokemon}" method="post" th:object="${pokemon}" enctype="multipart/form-data">
        <div>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" th:field="*{nome}" required />
        </div>

        <div>
            <label for="tipo1">Tipo 1:</label>
            <select id="tipo1" th:field="*{tipo1}" required>
                <option value="">-- Selecione --</option>
                <option>Fogo</option>
                <option>Água</option>
                <option>Grama</option>
                <option>Elétrico</option>
                <option>Psíquico</option>
                <option>Gelo</option>
                <option>Dragão</option>
                <option>Escuro</option>
                <option>Fada</option>
                <option>Normal</option>
                <option>Lutador</option>
                <option>Voador</option>
                <option>Venenoso</option>
                <option>Terra</option>
                <option>Rocha</option>
                <option>Inseto</option>
                <option>Aço</option>
                <option>Fantasma</option>
            </select>
        </div>

        <div>
            <label for="tipo2">Tipo 2:</label>
            <select id="tipo2" th:field="*{tipo2}">
                <option value="">-- Nenhum --</option>
                <option>Fogo</option>
                <option>Água</option>
                <option>Grama</option>
                <option>Elétrico</option>
                <option>Psíquico</option>
                <option>Gelo</option>
                <option>Dragão</option>
                <option>Escuro</option>
                <option>Fada</option>
                <option>Normal</option>
                <option>Lutador</option>
                <option>Voador</option>
                <option>Venenoso</option>
                <option>Terra</option>
                <option>Rocha</option>
                <option>Inseto</option>
                <option>Aço</option>
                <option>Fantasma</option>
            </select>
        </div>

        <div>
            <label for="descricao">Descrição:</label>
            <textarea id="descricao" th:field="*{descricao}" required></textarea>
        </div>

        <div>
            <label for="arquivo">Foto:</label>
            <input type="file" id="arquivo" name="arquivo" accept="image/*" required />
        </div>

        <div>
            <input type="submit" value="Capturar" />
        </div>
    </form>
</body>
</html>
